version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: orders
        description: Raw order records loaded by the Python ingestion step.
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null
          - name: order_date
            tests:
              - not_null
          - name: quantity
            tests:
              - not_null
          - name: unit_price
            tests:
              - not_null
